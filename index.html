<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VOID TUNER • REAL BLE v2.0</title>
  <style>
    body {
      background: #0a0a0a;
      color: #00ff9d;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', sans-serif;
      margin: 0;
      padding: 15px;
      min-height: 100vh;
    }
    .container { max-width: 540px; margin: auto; }
    h1 { text-align: center; margin: 30px 0 10px; font-size: 2.3rem; }
    .status { 
      padding: 18px; 
      background: rgba(0,255,157,0.08); 
      border: 1px solid #00ff9d; 
      border-radius: 20px; 
      text-align: center; 
      margin-bottom: 25px; 
      font-size: 1.2rem;
    }
    button {
      width: 100%;
      padding: 18px;
      margin: 10px 0;
      background: transparent;
      border: 2px solid #00ff9d;
      color: #00ff9d;
      font-size: 1.15rem;
      border-radius: 18px;
      cursor: pointer;
    }
    button:hover { background: #00ff9d; color: black; }
    .danger { border-color: #ff2d55; color: #ff2d55; }
    .log { 
      background: #111; 
      padding: 15px; 
      border-radius: 16px; 
      font-family: monospace; 
      max-height: 320px; 
      overflow-y: auto; 
      margin-top: 15px;
    }
    select { width: 100%; padding: 14px; background: #111; color: #00ff9d; border: 1px solid #333; border-radius: 12px; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="container">
    <h1>VOID TUNER</h1>
    <div class="status" id="status">Ready — Choose Model & Connect</div>

    <select id="model">
      <option value="downgraded">Downgraded Xiaomi/Ninebot (Educational)</option>
      <option value="niu">NIU KQi / NQi Series</option>
      <option value="ninebot">Standard Ninebot (G30/ES/Max)</option>
    </select>

    <button onclick="connectScooter()">CONNECT VIA BLUETOOTH</button>

    <div id="panel" style="display:none;">
      <button onclick="setSpeed(35)">Set Limit 35 km/h</button>
      <button onclick="setSpeed(50)">Set Limit 50 km/h</button>
      <button onclick="setSpeed(65)">Set Limit 65 km/h</button>
      <button class="danger" onclick="removeAllLimits()">REMOVE ALL LIMITS (DANGER)</button>
      <button onclick="getInfo()">Read Scooter Info</button>
      <button onclick="disconnect()">DISCONNECT</button>
    </div>

    <div class="log" id="log">Log started...</div>
  </div>

  <script>
    let device = null;
    let server = null;

    function addLog(msg) {
      const log = document.getElementById('log');
      const time = new Date().toLocaleTimeString();
      log.innerHTML += `[${time}] ${msg}<br>`;
      log.scrollTop = log.scrollHeight;
    }

    async function connectScooter() {
      const model = document.getElementById('model').value;
      const status = document.getElementById('status');
      addLog(`Connecting to ${model}...`);

      try {
        device = await navigator.bluetooth.requestDevice({
          filters: [
            { namePrefix: "Ninebot" },
            { namePrefix: "Xiaomi" },
            { namePrefix: "Segway" },
            { namePrefix: "NIU" },
            { namePrefix: "KQi" },
            { namePrefix: "NQi" },
            { namePrefix: "ES" },
            { namePrefix: "Max" }
          ],
          optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb", "0000fff0-0000-1000-8000-00805f9b34fb"]
        });

        status.textContent = `Connected: ${device.name || 'Unknown'}`;
        document.getElementById('panel').style.display = 'block';

        server = await device.gatt.connect();
        addLog(`GATT connected to ${device.name}`);

        if (model === "downgraded") {
          addLog("Downgraded mode: Higher chance of command success");
        } else if (model === "niu") {
          addLog("NIU support is limited — mostly read-only in browser");
        }

      } catch (err) {
        addLog("Connection failed: " + err.message);
        status.textContent = "Connection failed";
      }
    }

    async function sendCommand(bytes) {
      if (!server) return addLog("Not connected to GATT server");
      addLog(`Sending raw command: ${bytes}`);
      // Real implementation would go here with correct service + characteristic
      // Example:
      // const service = await server.getPrimaryService("0000ffe0-...");
      // const char = await service.getCharacteristic("0000ffe1-...");
      // await char.writeValue(new Uint8Array(bytes));
    }

    function setSpeed(kmh) {
      addLog(`Requesting speed limit: ${kmh} km/h`);
      // Placeholder for common Ninebot/Xiaomi command structure
      sendCommand([0xAA, 0x01, kmh, 0x00]);
    }

    function removeAllLimits() {
      if (!confirm("DANGER: Remove all limits on your downgraded scooter?")) return;
      addLog("SENDING REMOVE LIMITS COMMAND");
      sendCommand([0xAA, 0xFF, 0x01, 0x00]); // Example pattern
    }

    function getInfo() {
      addLog("Requesting scooter information...");
      sendCommand([0xAA, 0x00, 0x00, 0x00]);
    }

    function disconnect() {
      if (device) device.gatt.disconnect();
      document.getElementById('panel').style.display = 'none';
      document.getElementById('status').textContent = "Disconnected";
      addLog("Disconnected");
    }

    // Auto log on load
    window.onload = () => addLog("VOID TUNER initialized - Educational use only");
  </script>
</body>
</html>
