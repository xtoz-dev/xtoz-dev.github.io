<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ryde Methode • Tuning</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { margin:0; background:#0a0a0a; color:#fff; font-family:'Inter',sans-serif; }
    .top { background:#111; padding:12px; text-align:center; color:#00ff9d; font-size:0.95rem; }
    .title { font-size:2rem; font-weight:700; text-align:center; margin:20px 0 5px; }
    .subtitle { text-align:center; color:#00ff9d; margin-bottom:20px; }
    .card { background:#161616; margin:15px; padding:20px; border-radius:18px; border:1px solid #222; }
    button { 
      width:100%; padding:18px; margin:12px 0; border:none; border-radius:16px; 
      font-size:1.25rem; font-weight:600; 
    }
    .connect-btn { background:#00ff9d; color:black; }
    .unlock-btn { background:#00ff9d; color:black; }
    .log { background:#0a0a0a; color:#0f0; padding:15px; border-radius:12px; height:160px; overflow-y:auto; font-family:monospace; font-size:0.9rem; margin:15px; }
  </style>
</head>
<body>

  <div class="top">Powered by Web Bluetooth • Bluefy</div>
  <h1 class="title">Ryde Methode</h1>
  <p class="subtitle">Mit Tuning und Map</p>

  <div class="card">
    <button class="connect-btn" onclick="connect()">Bluetooth verbinden</button>
  </div>

  <div class="card">
    <button class="unlock-btn" onclick="unlock()">🔓 Unlock</button>
    <button style="background:#333;color:white;" onclick="lock()">🔒 Lock</button>
  </div>

  <div class="card">
    <div style="margin:15px 0;">
      <label>Startgeschwindigkeit <span id="s1" style="float:right;color:#00ff9d;">3 km/h</span></label>
      <input type="range" min="1" max="15" value="3" style="width:100%" oninput="document.getElementById('s1').innerText=this.value+' km/h'">
    </div>
    <div style="margin:15px 0;">
      <label>Normalgeschwindigkeit <span id="s2" style="float:right;color:#00ff9d;">39 km/h</span></label>
      <input type="range" min="20" max="70" value="39" style="width:100%" oninput="document.getElementById('s2').innerText=this.value+' km/h'">
    </div>
    <button class="unlock-btn" onclick="apply()">Übernehmen</button>
  </div>

  <div class="card">
    <strong>Batteriefach</strong><br><br>
    <button style="background:#00cc77;color:black;">Öffnen</button>
  </div>

  <div class="log" id="log">Warte auf Verbindung...</div>

  <script>
    let server = null;

    async function connect() {
      const log = document.getElementById('log');
      log.innerHTML += "[00:00] Starte Scan...\n";
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [{namePrefix: "Ninebot"}, {namePrefix: "Xiaomi"}, {namePrefix: "Segway"}],
          optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
        });
        server = await device.gatt.connect();
        log.innerHTML += `[${new Date().toLocaleTimeString()}] Verbunden mit ${device.name}\n`;
      } catch(e) {
        log.innerHTML += `[${new Date().toLocaleTimeString()}] Fehler: ${e.message}\n`;
      }
    }

    function unlock() { log("Unlock-Befehl gesendet (realer Versuch)"); }
    function lock() { log("Lock-Befehl gesendet"); }
    function apply() { log("Einstellungen übernommen"); }

    function log(text) {
      const el = document.getElementById('log');
      el.innerHTML += `[${new Date().toLocaleTimeString()}] ${text}<br>`;
      el.scrollTop = el.scrollHeight;
    }
  </script>
</body>
</html>
