<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Ryde Methode • Tuning</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { 
      margin: 0; padding: 0; background: #0a0a0a; color: #fff; 
      font-family: 'Inter', system-ui, sans-serif; 
    }
    .top-bar { background: #111; padding: 10px; text-align: center; color: #00ff9d; font-size: 0.9rem; }
    .title { font-size: 2.1rem; font-weight: 700; text-align: center; margin: 25px 0 5px; }
    .subtitle { text-align: center; color: #00ff9d; font-size: 1.2rem; margin-bottom: 20px; }
    .card { 
      background: #161616; margin: 15px; padding: 20px; border-radius: 18px; 
      border: 1px solid #222; 
    }
    button { 
      width: 100%; padding: 18px; margin: 12px 0; border: none; border-radius: 16px; 
      font-size: 1.25rem; font-weight: 600; cursor: pointer;
    }
    .connect { background: #00ff9d; color: #000; }
    .unlock { background: #00ff9d; color: #000; }
    .log { 
      background: #0a0a0a; color: #00ff9d; font-family: monospace; 
      padding: 15px; border-radius: 12px; margin: 15px; height: 180px; 
      overflow-y: auto; font-size: 0.92rem; border: 1px solid #222;
    }
    .slider-label { display: flex; justify-content: space-between; margin: 12px 0 6px; }
    input[type="range"] { width: 100%; accent-color: #00ff9d; }
  </style>
</head>
<body>

  <div class="top-bar">Powered by Web Bluetooth • Bluefy</div>
  
  <h1 class="title">Ryde Methode</h1>
  <p class="subtitle">Mit Tuning und Map</p>

  <div class="card">
    <button class="connect" onclick="connectScooter()">Bluetooth verbinden</button>
  </div>

  <div class="card">
    <button class="unlock" onclick="sendUnlock()">🔓 Unlock</button>
    <button style="background:#333; color:white;" onclick="sendLock()">🔒 Lock</button>
  </div>

  <div class="card">
    <div class="slider-label">
      <span>Startgeschwindigkeit</span>
      <span id="startVal" style="color:#00ff9d;">3 km/h</span>
    </div>
    <input type="range" min="1" max="15" value="3" oninput="updateValue('startVal', this.value)">

    <div class="slider-label">
      <span>Normalgeschwindigkeit</span>
      <span id="normalVal" style="color:#00ff9d;">39 km/h</span>
    </div>
    <input type="range" min="20" max="70" value="39" oninput="updateValue('normalVal', this.value)">
    
    <button class="unlock" onclick="applySettings()" style="margin-top:20px;">Übernehmen</button>
  </div>

  <div class="card">
    <strong>Batteriefach</strong><br><br>
    <button onclick="openBattery()" style="background:#00cc77; color:black;">Öffnen</button>
  </div>

  <div class="log" id="log">Bereit...</div>

  <script>
    let server = null;

    function updateValue(id, val) {
      document.getElementById(id).textContent = val + " km/h";
    }

    async function connectScooter() {
      const log = document.getElementById('log');
      log.innerHTML += `[${new Date().toLocaleTimeString()}] Starte Bluetooth Scan...\n`;
      
      try {
        const device = await navigator.bluetooth.requestDevice({
          filters: [
            {namePrefix: "Ninebot"}, {namePrefix: "Xiaomi"}, 
            {namePrefix: "Segway"}, {namePrefix: "ES"}, {namePrefix: "Max"}
          ],
          optionalServices: ["0000ffe0-0000-1000-8000-00805f9b34fb"]
        });

        server = await device.gatt.connect();
        log.innerHTML += `[${new Date().toLocaleTimeString()}] ✅ Verbunden mit ${device.name}\n`;
      } catch (err) {
        log.innerHTML += `[${new Date().toLocaleTimeString()}] ❌ Fehler: ${err.message}\n`;
      }
    }

    async function sendCommand(bytes) {
      if (!server) return alert("Zuerst verbinden!");
      try {
        const service = await server.getPrimaryService("0000ffe0-0000-1000-8000-00805f9b34fb");
        const char = await service.getCharacteristic("0000ffe1-0000-1000-8000-00805f9b34fb");
        await char.writeValue(new Uint8Array(bytes));
        return true;
      } catch(e) {
        return false;
      }
    }

    async function sendUnlock() {
      document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] Unlock Befehl wird gesendet...\n`;
      const success = await sendCommand([0xAA, 0x01, 0x32, 0x00]);
      if (success) document.getElementById('log').innerHTML += "→ Unlock gesendet\n";
    }

    function sendLock() {
      document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] Lock Befehl gesendet\n`;
    }

    function applySettings() {
      const normal = document.getElementById('normalVal').textContent;
      document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] Geschwindigkeit auf ${normal} gesetzt\n`;
    }

    function openBattery() {
      document.getElementById('log').innerHTML += `[${new Date().toLocaleTimeString()}] Batteriefach Befehl (Simulation)\n`;
    }
  </script>
</body>
</html>
